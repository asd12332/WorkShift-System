<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkShift — Clock In/Out</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060810;
    --surface: #0d1117;
    --card: #111827;
    --border: #1f2937;
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --amber: #f59e0b;
    --text: #f1f5f9;
    --muted: #64748b;
    --subtle: #1e293b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* AMBIENT BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
    top: -100px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    pointer-events: none;
  }

  /* MAIN CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--green-dim);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
  }

  /* CLOCK */
  .clock-display {
    text-align: center;
    margin-bottom: 28px;
    padding: 24px;
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .clock-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(16,185,129,0.03), transparent 60%);
  }

  .clock-time {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -2px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    margin-bottom: 6px;
  }

  .clock-date {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* EMPLOYEE SELECT */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .field select, .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    appearance: none;
  }

  .field select:focus, .field input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
  }

  /* LOCATION STATUS */
  .location-status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 16px;
    transition: all 0.3s;
  }

  .loc-checking {
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    color: var(--amber);
  }

  .loc-ok {
    background: var(--green-dim);
    border: 1px solid rgba(16,185,129,0.25);
    color: var(--green);
  }

  .loc-fail {
    background: var(--red-dim);
    border: 1px solid rgba(239,68,68,0.25);
    color: var(--red);
  }

  .loc-icon {
    font-size: 16px;
    flex-shrink: 0;
  }

  .loc-dist {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: 0.8;
  }

  /* ACTION BUTTONS */
  .action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 8px;
  }

  .btn-clock {
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .btn-clock:active { transform: scale(0.97); }

  .btn-clock:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none !important;
  }

  .btn-in {
    background: linear-gradient(135deg, #059669, #10b981);
    color: white;
    box-shadow: 0 8px 24px rgba(16,185,129,0.3);
  }

  .btn-in:hover:not(:disabled) {
    box-shadow: 0 12px 32px rgba(16,185,129,0.45);
    transform: translateY(-2px);
  }

  .btn-out {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: white;
    box-shadow: 0 8px 24px rgba(239,68,68,0.3);
  }

  .btn-out:hover:not(:disabled) {
    box-shadow: 0 12px 32px rgba(239,68,68,0.45);
    transform: translateY(-2px);
  }

  .btn-icon { font-size: 22px; }
  .btn-label { font-size: 13px; opacity: 0.9; font-weight: 500; }

  /* STATUS INDICATOR */
  .current-status {
    text-align: center;
    padding: 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    margin-top: 16px;
    display: none;
  }

  .status-in {
    display: block;
    background: var(--green-dim);
    border: 1px solid rgba(16,185,129,0.2);
    color: var(--green);
  }

  .status-out {
    display: block;
    background: var(--red-dim);
    border: 1px solid rgba(239,68,68,0.2);
    color: var(--red);
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* RECENT LOG */
  .recent-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .log-list { display: flex; flex-direction: column; gap: 8px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-in { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-out { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .log-name { font-weight: 600; flex: 1; }
  .log-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .log-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .type-in { background: var(--green-dim); color: var(--green); }
  .type-out { background: var(--red-dim); color: var(--red); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 8px;
    opacity: 0;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ADMIN LINK */
  .admin-link {
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }

  .admin-link a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
  }

  .admin-link a:hover { text-decoration: underline; }

  /* SPINNER */
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(245,158,11,0.3);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* SUCCESS ANIMATION */
  @keyframes successPop {
    0% { transform: scale(0.8); opacity: 0; }
    60% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .success-anim { animation: successPop 0.4s ease forwards; }
</style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <div class="logo-icon">⏱</div>
    <span class="logo-text">WorkShift</span>
    <span class="logo-sub">Employee Portal</span>
  </div>

  <div class="clock-display">
    <div class="clock-time" id="clock">00:00:00</div>
    <div class="clock-date" id="clockDate"></div>
  </div>

  <div class="field">
    <label>Select Your Name</label>
    <select id="empSelect" onchange="onEmpChange()">
      <option value="">— Choose Employee —</option>
    </select>
  </div>

  <div class="location-status loc-checking" id="locStatus">
    <span class="loc-icon"><span class="spinner"></span></span>
    <span id="locText">Detecting your location...</span>
    <span class="loc-dist" id="locDist"></span>
  </div>

  <div class="action-buttons">
    <button class="btn-clock btn-in" id="btnIn" disabled onclick="clockAction('in')">
      <span class="btn-icon">▶</span>
      <span>Clock In</span>
      <span class="btn-label">Start Shift</span>
    </button>
    <button class="btn-clock btn-out" id="btnOut" disabled onclick="clockAction('out')">
      <span class="btn-icon">■</span>
      <span>Clock Out</span>
      <span class="btn-label">End Shift</span>
    </button>
  </div>

  <div class="current-status" id="currentStatus"></div>

  <div class="divider"></div>

  <div class="recent-title">Today's Activity</div>
  <div class="log-list" id="logList">
    <div style="text-align:center;color:var(--muted);font-size:13px;padding:12px;">No activity yet today</div>
  </div>
</div>

<div class="admin-link">
  <a href="admin-dashboard.html">Admin Dashboard →</a>
</div>

<div class="toast" id="toast"></div>

<script>
// =========== CONFIG ===========
const API_URL = "https://sheetdb.io/api/v1/f88bycrvwfczq";
const WORK_LAT = 31.95779990875444;
const WORK_LNG = 35.860622007596;
const ALLOWED_RADIUS_METERS = 50;

// =========== STATE ===========
let employees = JSON.parse(localStorage.getItem('ws_employees') || '[]');
let attendanceLogs = JSON.parse(localStorage.getItem('ws_attendance') || '[]');
let locationOk = false;
let userLat = null, userLng = null;

// Add sample employees if none
if (!employees.length) {
  employees = [
    { id: 1, name: 'Ahmed Hassan', role: 'Manager', dept: 'Management' },
    { id: 2, name: 'Sara Ali', role: 'Cashier', dept: 'Sales' },
    { id: 3, name: 'Omar Khalil', role: 'Technician', dept: 'IT' },
  ];
  localStorage.setItem('ws_employees', JSON.stringify(employees));
}

// =========== CLOCK ===========
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour12: false });
  document.getElementById('clockDate').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

// =========== POPULATE ===========
function populateEmployees() {
  const sel = document.getElementById('empSelect');
  sel.innerHTML = '<option value="">— Choose Employee —</option>' +
    employees.map(e => `<option value="${e.id}">${e.name} — ${e.role}</option>`).join('');
}
populateEmployees();

// =========== HAVERSINE DISTANCE ===========
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// =========== GEOLOCATION ===========
function checkLocation() {
  const locStatus = document.getElementById('locStatus');
  const locText = document.getElementById('locText');
  const locDist = document.getElementById('locDist');

  locStatus.className = 'location-status loc-checking';
  locText.textContent = 'Detecting your location...';
  locDist.textContent = '';

  if (!navigator.geolocation) {
    locStatus.className = 'location-status loc-fail';
    locText.textContent = 'Geolocation not supported by your browser';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      const dist = Math.round(haversine(userLat, userLng, WORK_LAT, WORK_LNG));
      locationOk = dist <= ALLOWED_RADIUS_METERS;

      if (locationOk) {
        locStatus.className = 'location-status loc-ok';
        locText.innerHTML = `✓ You are at the workplace`;
        locDist.textContent = `${dist}m away`;
      } else {
        locStatus.className = 'location-status loc-fail';
        locText.innerHTML = `✗ Too far from workplace`;
        locDist.textContent = `${dist}m away`;
      }
      updateButtons();
    },
    err => {
      locStatus.className = 'location-status loc-fail';
      locDist.textContent = '';
      if (err.code === 1) {
        locText.innerHTML = '✗ Location permission denied. Please allow location access.';
      } else {
        locText.innerHTML = '✗ Could not detect location. Try again.';
      }
      locationOk = false;
      updateButtons();
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

checkLocation();
// Recheck every 30 seconds
setInterval(checkLocation, 30000);

// =========== EMPLOYEE CHANGE ===========
function onEmpChange() {
  updateButtons();
  renderStatus();
}

function todayStr() { return new Date().toISOString().split('T')[0]; }

function getLastLog(empId) {
  const today = todayStr();
  const todayLogs = attendanceLogs.filter(l => l.empId == empId && l.date === today);
  return todayLogs.length ? todayLogs[todayLogs.length - 1] : null;
}

function updateButtons() {
  const empId = document.getElementById('empSelect').value;
  const btnIn = document.getElementById('btnIn');
  const btnOut = document.getElementById('btnOut');

  if (!empId || !locationOk) {
    btnIn.disabled = true;
    btnOut.disabled = true;
    return;
  }

  const last = getLastLog(empId);
  // Can clock in if: no log today OR last action was 'out'
  const canIn = !last || last.type === 'out';
  // Can clock out if: last action was 'in'
  const canOut = last && last.type === 'in';

  btnIn.disabled = !canIn;
  btnOut.disabled = !canOut;
}

function renderStatus() {
  const empId = document.getElementById('empSelect').value;
  const statusEl = document.getElementById('currentStatus');
  if (!empId) { statusEl.className = 'current-status'; return; }
  const last = getLastLog(empId);
  if (!last) { statusEl.className = 'current-status'; return; }
  if (last.type === 'in') {
    statusEl.className = 'current-status status-in success-anim';
    statusEl.innerHTML = `✓ Currently clocked in since <strong>${last.time}</strong>`;
  } else {
    statusEl.className = 'current-status status-out';
    statusEl.innerHTML = `● Shift ended at <strong>${last.time}</strong>`;
  }
}

// =========== CLOCK ACTION ===========
async function clockAction(type) {
  const empId = parseInt(document.getElementById('empSelect').value);
  if (!empId) { showToast('⚠ Please select your name', '#f59e0b'); return; }
  if (!locationOk) { showToast('✗ You must be at the workplace', '#ef4444'); return; }

  const now = new Date();
  const emp = employees.find(e => e.id == empId);
  
  // 1. Prepare the data for Google Sheets
  const logData = {
    empId: empId,
    name: emp.name,
    date: todayStr(),
    time: now.toLocaleTimeString('en-US', { hour12: false }),
    type: type,
    dist: Math.round(haversine(userLat, userLng, WORK_LAT, WORK_LNG))
  };

  showToast("Saving to Google Sheets...", "#3b82f6");

  // 2. Send data to SheetDB API
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: [logData] })
    });

    if (response.ok) {
      attendanceLogs.push(logData); // Update local view
      showToast(`✓ Success! Clocked ${type.toUpperCase()}`, '#10b981');
      updateButtons();
      renderStatus();
      renderTodayLog();
    }
  } catch (error) {
    showToast("Error: Could not connect to Sheet", "#ef4444");
  }
}
// =========== TODAY LOG ===========
function renderTodayLog() {
  const today = todayStr();
  const container = document.getElementById('logList');
  const todayLogs = attendanceLogs
    .filter(l => l.date === today)
    .sort((a, b) => b.id - a.id)
    .slice(0, 6);

  if (!todayLogs.length) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:12px;">No activity yet today</div>';
    return;
  }

  container.innerHTML = todayLogs.map(l => {
    const emp = employees.find(e => e.id == l.empId);
    const name = emp ? emp.name.split(' ')[0] : 'Unknown';
    return `<div class="log-item">
      <div class="log-dot ${l.type === 'in' ? 'dot-in' : 'dot-out'}"></div>
      <span class="log-name">${name}</span>
      <span class="log-type ${l.type === 'in' ? 'type-in' : 'type-out'}">${l.type.toUpperCase()}</span>
      <span class="log-time">${l.time}</span>
    </div>`;
  }).join('');
}

renderTodayLog();
renderStatus();

// =========== TOAST ===========
function showToast(msg, color = '#10b981') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color + '40';
  t.style.color = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
